function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Settings', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clamp = React.useCallback(() => {
    const p = dragRef.current;
    if (!p) return;
    const maxR = Math.max(PAD, window.innerWidth - p.offsetWidth - PAD);
    const maxB = Math.max(PAD, window.innerHeight - p.offsetHeight - PAD);
    offsetRef.current = {
      x: Math.min(maxR, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxB, Math.max(PAD, offsetRef.current.y)),
    };
    p.style.right = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clamp();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clamp) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clamp);
    return () => ro ? ro.disconnect() : window.removeEventListener('resize', clamp);
  }, [open, clamp]);

  React.useEffect(() => {
    const onMsg = e => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.postMessage({ type: '__deactivate_edit_mode' }, '*');
  };

  const onDragStart = e => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startR = window.innerWidth - r.right;
    const startB = window.innerHeight - r.bottom;
    const move = ev => {
      offsetRef.current = { x: startR - (ev.clientX - sx), y: startB - (ev.clientY - sy) };
      clamp();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function launchConfetti(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const colors = ['#B07D6E','#E8C4A8','#8BAF8A','#9B8AAE','#7A9CB8','#F9D49A','#E07B5A'];
  const particles = Array.from({length:80}, () => ({
    x: W/2 + (Math.random()-0.5)*W*0.4, y: H*0.4,
    vx: (Math.random()-0.5)*8, vy: Math.random()*-12 - 4,
    size: Math.random()*8+4,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*360, rotV: (Math.random()-0.5)*10,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    alpha: 1,
  }));
  let frame;
  function draw() {
    ctx.clearRect(0,0,W,H);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.35; p.vx *= 0.99;
      p.rot += p.rotV; p.alpha -= 0.012;
      if (p.alpha <= 0) return;
      alive = true;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,W,H);
  }
  draw();
  return () => cancelAnimationFrame(frame);
}

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [showPass, setShowPass] = useState(false);

  function validate() {
    const e = {};
    if (mode === 'signup' && !name.trim()) e.name = 'Please enter your name';
    if (!email.includes('@')) e.email = 'Enter a valid email';
    if (password.length < 6) e.password = 'At least 6 characters';
    return e;
  }

  function handleSubmit() {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setLoading(true);
    setTimeout(() => { setLoading(false); onAuth(name || email.split('@')[0]); }, 900);
  }

  const Field = ({ id, label, value, onChange, type='text', placeholder, error, right }) => (
    <div style={{ marginBottom: error ? 12 : 16 }}>
      <label style={{ fontSize:12, fontWeight:600, color:'#8A6E62', letterSpacing:0.5, textTransform:'uppercase', display:'block', marginBottom:6 }}>{label}</label>
      <div style={{ position:'relative' }}>
        <input value={value} onChange={e => { onChange(e.target.value); setErrors(p => ({...p,[id]:undefined})); }}
          type={type} placeholder={placeholder}
          style={{
            width:'100%', height:52, borderRadius:16,
            border:`1.5px solid ${error ? '#C4585A' : '#E0D4C8'}`,
            padding:'0 16px', paddingRight: right ? 48 : 16,
            fontSize:16, color:'#3D2B1F', background:'#FEFCF9',
            fontFamily:"'DM Sans', sans-serif", outline:'none', transition:'border 0.2s',
          }}
          onFocus={e => e.target.style.border=`1.5px solid ${error ? '#C4585A' : '#B07D6E'}`}
          onBlur={e => e.target.style.border=`1.5px solid ${error ? '#C4585A' : '#E0D4C8'}`}
        />
        {right}
      </div>
      {error && <p style={{ fontSize:12, color:'#C4585A', marginTop:4, paddingLeft:4 }}>{error}</p>}
    </div>
  );

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'#F9F6F0', padding:'48px 28px 40px', overflowY:'auto' }}>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:36 }}>
        <div style={{ width:72, height:72, borderRadius:24, marginBottom:16, background:'linear-gradient(135deg, #E8D4C4, #F4E8DC)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:36, boxShadow:'0 12px 40px rgba(176,125,110,0.25)' }}>🔥</div>
        <h1 style={{ fontFamily:"'DM Serif Display', serif", fontSize:28, color:'#3D2B1F' }}>Streak</h1>
        <p style={{ fontSize:14, color:'#8A6E62', marginTop:4 }}>{mode === 'login' ? 'Welcome back!' : 'Start your streak today.'}</p>
      </div>

      <div style={{ display:'flex', background:'#EDE6DB', borderRadius:14, padding:4, marginBottom:28, gap:4 }}>
        {['login','signup'].map(m => (
          <button key={m} onClick={() => { setMode(m); setErrors({}); }} style={{
            flex:1, height:38, borderRadius:11, border:'none',
            background: mode===m ? '#FEFCF9' : 'transparent',
            color: mode===m ? '#3D2B1F' : '#8A6E62',
            fontSize:14, fontWeight: mode===m ? 600 : 400, cursor:'pointer',
            fontFamily:"'DM Sans', sans-serif",
            boxShadow: mode===m ? '0 2px 8px rgba(61,43,31,0.1)' : 'none',
            transition:'all 0.2s', textTransform:'capitalize',
          }}>{m === 'login' ? 'Log in' : 'Sign up'}</button>
        ))}
      </div>

      <div style={{ flex:1 }}>
        {mode === 'signup' && <Field id="name" label="Your name" value={name} onChange={setName} placeholder="e.g. Alex" error={errors.name} />}
        <Field id="email" label="Email" value={email} onChange={setEmail} type="email" placeholder="you@example.com" error={errors.email} />
        <Field id="password" label="Password" value={password} onChange={setPassword}
          type={showPass ? 'text' : 'password'} placeholder="Min. 6 characters" error={errors.password}
          right={<button onClick={() => setShowPass(p => !p)} style={{ position:'absolute', right:14, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', fontSize:18, color:'#B07D6E' }}>{showPass ? '🙈' : '👁'}</button>}

// ─── TODAY SCREEN ─────────────────────────────────────────────────────────────
function TodayScreen({ habits, setHabits, onHabitTap, tweak, confettiRef, onAddHabit }) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  const doneCnt = habits.filter(h => h.doneToday).length;
  const pct = habits.length ? doneCnt/habits.length : 0;

  function handleCheck(id) {
    setHabits(prev => prev.map(h => {
      if (h.id !== id) return h;
      const newDone = !h.doneToday;
      if (newDone && tweak.enableConfetti) launchConfetti(confettiRef.current);
      return { ...h, doneToday: newDone, streak: newDone ? h.streak+1 : Math.max(0,h.streak-1) };
    }));
  }

  const allDone = doneCnt === habits.length && habits.length > 0;

  return (
    <div style={{ padding:'12px 20px 0' }}>
      <div style={{ marginBottom:24 }}>
        <p style={{ fontSize:13, fontWeight:500, color:'#B07D6E', letterSpacing:1, textTransform:'uppercase', marginBottom:4 }}>{dateStr}</p>
        <h2 style={{ fontFamily:"'DM Serif Display', serif", fontSize:30, color:'#3D2B1F', lineHeight:1.15 }}>
          {allDone ? 'Perfect day! 🎉' : doneCnt === 0 ? 'Ready to start?' : `${doneCnt} down, ${habits.length - doneCnt} to go`}
        </h2>
      </div>

      <div style={{ background:'#EDE6DB', borderRadius:24, padding:'20px', marginBottom:20, display:'flex', alignItems:'center', gap:20 }}>
        <ProgressRing pct={pct} size={76} stroke={7} color={tweak.accentColor} />
        <div>
          <p style={{ fontSize:28, fontWeight:700, color:'#3D2B1F', fontFamily:"'DM Serif Display', serif" }}>{doneCnt}/{habits.length}</p>
          <p style={{ fontSize:14, color:'#8A6E62', marginTop:2 }}>habits completed today</p>
          {pct > 0 && <p style={{ fontSize:12, color:'#B07D6E', marginTop:6, fontWeight:600 }}>
            {pct === 1 ? '🏆 All done!' : pct >= 0.5 ? '🔥 On fire!' : '⚡ Keep going!'}
          </p>}
        </div>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {habits.map(h => (
          <HabitCard key={h.id} habit={h} onCheck={() => handleCheck(h.id)} onTap={() => onHabitTap(h)} onDelete={id => setHabits(prev => prev.filter(h => h.id !== id))} />
        ))}
      </div>

      <button onClick={onAddHabit} style={{
        width:'100%', height:56, borderRadius:18, border:'2px dashed #D4C4B8',
        background:'transparent', color:'#B07D6E', fontSize:15, fontWeight:600,
        cursor:'pointer', marginTop:16, display:'flex', alignItems:'center', justifyContent:'center', gap:8,
        fontFamily:"'DM Sans', sans-serif",
      }}>
        <span style={{ fontSize:20 }}>+</span> Add habit
      </button>
    </div>
  );
}

function ProgressRing({ pct, size=80, stroke=8, color='#B07D6E' }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform:'rotate(-90deg)', flexShrink:0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#D4C4B4" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${circ*pct} ${circ}`} strokeLinecap="round"
        style={{ transition:'stroke-dasharray 0.6s cubic-bezier(0.34,1.2,0.64,1)' }}/>
    </svg>
  );
}

function HabitCard({ habit, onCheck, onTap, onDelete }) {
  const [pressing, setPressing] = useState(false);
  const [swipeX, setSwipeX] = useState(0);
  const [swiping, setSwiping] = useState(false);
  const [deleted, setDeleted] = useState(false);
  const startXRef = useRef(null);
  const mouseDownX = useRef(null);
  const DELETE_THRESHOLD = -80;

  function onTouchStart(e) { startXRef.current = e.touches[0].clientX; setSwiping(false); }
  function onTouchMove(e) {
    if (startXRef.current === null) return;
    const dx = e.touches[0].clientX - startXRef.current;
    if (dx < -5) { setSwiping(true); setSwipeX(Math.max(-110, dx)); }
    else if (dx > 5) setSwipeX(0);
  }
  function onTouchEnd() {
    setSwipeX(swipeX < DELETE_THRESHOLD ? -110 : 0);
    setSwiping(false);
    startXRef.current = null;
  }
  function onMouseDown(e) { mouseDownX.current = e.clientX; }
  function onMouseMove(e) {
    if (mouseDownX.current === null) return;
    const dx = e.clientX - mouseDownX.current;
    if (dx < -5) { setSwiping(true); setSwipeX(Math.max(-110, dx)); }
  }
  function onMouseUp() {
    setSwipeX(swipeX < DELETE_THRESHOLD ? -110 : 0);
    setSwiping(false);
    mouseDownX.current = null;
  }
  function handleDelete() { setDeleted(true); setTimeout(() => onDelete(habit.id), 300); }
  if (deleted) return null;

  const revealed = swipeX <= -80;
  return (
    <div style={{ position:'relative', borderRadius:20, overflow:'hidden' }}>
      <div style={{ position:'absolute', right:0, top:0, bottom:0, width:110, background:'#C4585A', display:'flex', alignItems:'center', justifyContent:'center', borderRadius:20 }}>
        <button onClick={handleDelete} style={{ width:'100%', height:'100%', background:'none', border:'none', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4 }}>
          <span style={{ fontSize:22 }}>🗑</span>
          <span style={{ fontSize:12, color:'white', fontWeight:600 }}>Remove</span>
        </button>
      </div>
      <div
        onClick={() => { if (swipeX === 0) onTap(); else setSwipeX(0); }}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        onMouseDown={e => { setPressing(true); onMouseDown(e); }}
        onMouseMove={onMouseMove}
        onMouseUp={() => { setPressing(false); onMouseUp(); }}
        onMouseLeave={() => { setPressing(false); if (!swiping) mouseDownX.current = null; }}
        style={{
          background: habit.doneToday ? `${habit.color}18` : '#FFFFFF',
          border: `1.5px solid ${habit.doneToday ? habit.color+'55' : '#EDE6DB'}`,
          borderRadius:20, padding:'14px 16px',
          display:'flex', alignItems:'center', gap:14, cursor:'pointer',
          transform: `translateX(${swipeX}px) scale(${pressing && swipeX === 0 ? 0.98 : 1})`,
          transition: swiping ? 'none' : 'transform 0.3s cubic-bezier(0.34,1.2,0.64,1)',
          boxShadow: habit.doneToday ? `0 4px 20px ${habit.color}22` : '0 2px 8px rgba(61,43,31,0.06)',
          position:'relative', zIndex:1, userSelect:'none',
        }}
      >
        <div style={{ width:44, height:44, borderRadius:14, background:`${habit.color}20`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, flexShrink:0 }}>{habit.emoji}</div>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontSize:16, fontWeight:600, color:'#3D2B1F', textDecoration: habit.doneToday ? 'line-through' : 'none', opacity: habit.doneToday ? 0.6 : 1 }}>{habit.name}</p>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:3 }}>
            <span style={{ fontSize:12, color:'#B07D6E' }}>🔥 {habit.streak} day streak</span>
            <span style={{ width:3, height:3, borderRadius:'50%', background:'#D4C4B8' }}></span>
            <span style={{ fontSize:12, color:'#A8927E' }}>{habit.category}</span>
          </div>
        </div>
        {!revealed
          ? <CheckButton checked={habit.doneToday} color={habit.color} onToggle={e => { e.stopPropagation(); onCheck(); }} />
          : <span style={{ fontSize:13, color:'#C4585A', fontWeight:600, flexShrink:0 }}>Delete →</span>}
      </div>
    </div>
  );
}

function CheckButton({ checked, color, onToggle }) {
  return (
    <button onClick={onToggle} style={{
      width:36, height:36, borderRadius:12, border:`2px solid ${checked ? color : '#D4C4B8'}`,
      background: checked ? color : 'transparent',
      display:'flex', alignItems:'center', justifyContent:'center',

      transform: checked ? 'scale(1.1)' : 'scale(1)',
      transition:'all 0.3s cubic-bezier(0.34,1.56,0.64,1)',

    </button>
  );

                <span style={{ fontSize:20 }}>{h.emoji}</span>
                <span style={{ flex:1, fontSize:14, fontWeight:600, color:'#3D2B1F' }}>{h.name}</span>
                <span style={{ fontSize:13, fontWeight:700, color:h.color }}>{rate}%</span>
              </div>
              <div style={{ height:6, borderRadius:3, background:'#EDE6DB', overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${rate}%`, borderRadius:3, background:h.color, transition:'width 0.8s cubic-bezier(0.34,1.2,0.64,1)' }}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── REFLECT SCREEN ────────────────────────────────────────────────────────────
function ReflectScreen({ habits }) {
  const [entry, setEntry] = useState('');
  const [saved, setSaved] = useState(false);
  const [promptIdx, setPromptIdx] = useState(0);
  const prompts = [
    'What went well today?',
    'What got in your way?',
    'What will you do differently?',
    'What are you proud of this week?',
  ];

  function handleSave() {
    if (!entry.trim()) return;
    try {
      const existing = JSON.parse(localStorage.getItem('streak_journal') || '[]');
      const updated = [{ text: entry, date: new Date().toISOString(), prompt: prompts[promptIdx] }, ...existing].slice(0, 50);
      localStorage.setItem('streak_journal', JSON.stringify(updated));
    } catch {}
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
    setEntry('');
  }

  return (
    <div style={{ padding:'12px 20px 0' }}>
      <h2 style={{ fontFamily:"'DM Serif Display', serif", fontSize:30, color:'#3D2B1F', marginBottom:6 }}>Reflect</h2>
      <p style={{ fontSize:14, color:'#8A6E62', marginBottom:20 }}>A moment to pause and check in.</p>
      <div style={{ background:'#EDE6DB', borderRadius:22, padding:'18px 16px', marginBottom:20 }}>
        <p style={{ fontSize:14, fontWeight:600, color:'#3D2B1F', marginBottom:12 }}>How are you feeling today?</p>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          {['😫','😔','😐','🙂','😄'].map((m,i) => <MoodButton key={i} emoji={m} />)}
        </div>
      </div>
      <div style={{ background:'#FFFFFF', borderRadius:22, padding:'18px 16px', marginBottom:16, boxShadow:'0 2px 12px rgba(61,43,31,0.06)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <p style={{ fontSize:14, fontWeight:600, color:'#3D2B1F' }}>{prompts[promptIdx]}</p>
          <button onClick={() => setPromptIdx((promptIdx+1) % prompts.length)} style={{ background:'none', border:'none', fontSize:18, cursor:'pointer' }}>↻</button>
        </div>
        <textarea value={entry} onChange={e => setEntry(e.target.value)} placeholder="Write your thoughts…"
          style={{ width:'100%', minHeight:120, border:'none', outline:'none', resize:'none', fontSize:15, color:'#3D2B1F', lineHeight:1.6, background:'transparent', fontFamily:"'DM Sans', sans-serif" }}
        />
        <button onClick={handleSave} style={{ width:'100%', height:44, borderRadius:14, border:'none', background: saved ? '#8BAF8A' : (entry ? '#7A4A3C' : '#E0D4C8'), color: entry || saved ? '#FAF0E6' : '#A89080', fontSize:14, fontWeight:600, cursor: entry ? 'pointer' : 'default', fontFamily:"'DM Sans', sans-serif", transition:'all 0.3s' }}>
          {saved ? '✓ Saved!' : 'Save entry'}
        </button>
      </div>
      <div style={{ background:'#FEFCF9', borderRadius:22, padding:'18px 16px', border:'1.5px solid #E8DDD4' }}>
        <h3 style={{ fontSize:15, fontWeight:600, color:'#3D2B1F', marginBottom:14 }}>Today at a glance</h3>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {habits.slice(0,4).map(h => (
            <div key={h.id} style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span style={{ fontSize:18 }}>{h.emoji}</span>
              <span style={{ flex:1, fontSize:14, color:'#3D2B1F' }}>{h.name}</span>
              <div style={{ width:24, height:24, borderRadius:8, background: h.doneToday ? h.color : '#EDE6DB', display:'flex', alignItems:'center', justifyContent:'center' }}>
                {h.doneToday && <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function MoodButton({ emoji }) {
  const [selected, setSelected] = useState(false);
  return (
    <button onClick={() => setSelected(!selected)} style={{ width:50, height:50, borderRadius:16, border:`2px solid ${selected ? '#B07D6E' : 'transparent'}`, background: selected ? '#FAF0E6' : 'transparent', fontSize:26, cursor:'pointer', transform: selected ? 'scale(1.2)' : 'scale(1)', transition:'all 0.25s cubic-bezier(0.34,1.56,0.64,1)' }}>{emoji}</button>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tweak, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Persist auth & onboarding state
  const savedUser = (() => { try { return localStorage.getItem('streak_userName') || ''; } catch { return ''; } })();
  const [authDone, setAuthDone] = useState(!!savedUser);
  const [userName, setUserName] = useState(savedUser);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [tab, setTab] = useState('today');

  // Persist habits with daily reset
  const [habits, setHabits] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('streak_habits') || 'null');
      if (!saved) return INITIAL_HABITS;
      const lastDate = localStorage.getItem('streak_lastDate');
      const today = new Date().toDateString();
      if (lastDate !== today) {
        localStorage.setItem('streak_lastDate', today);
        return saved.map(h => ({ ...h, doneToday: false }));
      }
      return saved;
    } catch { return INITIAL_HABITS; }
  });

  useEffect(() => {
    try {
      localStorage.setItem('streak_habits', JSON.stringify(habits));
      localStorage.setItem('streak_lastDate', new Date().toDateString());
    } catch {}
  }, [habits]);

  const [selectedHabit, setSelectedHabit] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const confettiRef = useRef(null);

  const isDetail = !!selectedHabit && tab === 'today';
  const isCreate = showCreate;

  function handleAuth(name) {
    setUserName(name);
    try { localStorage.setItem('streak_userName', name); } catch {}
    setAuthDone(true);
    setShowOnboarding(true);
  }

  function handleSignOut() {
    try { localStorage.removeItem('streak_userName'); localStorage.removeItem('streak_onboardingDone'); } catch {}
    setAuthDone(false);
    setUserName('');
    setShowOnboarding(false);
    window.postMessage({ type: '__deactivate_edit_mode' }, '*');
  }

  function getScreenClass(name) {
    if (!authDone) return name === 'auth' ? '' : 'hidden-right';
    if (showOnboarding) return name === 'onboarding' ? '' : 'hidden-right';
    if (isCreate) return name === 'create' ? '' : 'hidden-left';
    if (isDetail) return name === 'detail' ? '' : 'hidden-left';
    return name === tab ? '' : 'hidden-right';
  }

  return (
    <div style={{ position:'relative', width:'100%', height:'100%' }}>
      <canvas ref={confettiRef} id="confetti-canvas"/>

      <div className="screen-container">
        {/* Auth */}
        <div className={`screen no-nav ${getScreenClass('auth')}`} style={{ paddingTop: 0 }}>
          <AuthScreen onAuth={handleAuth} />
        </div>

        {/* Onboarding */}
        <div className={`screen no-nav ${getScreenClass('onboarding')}`} style={{ paddingTop: 0 }}>
          <OnboardingScreen onDone={() => { setShowOnboarding(false); try { localStorage.setItem('streak_onboardingDone', '1'); } catch {} }} userName={userName} />
        </div>

        {/* Today */}
        <div className={`screen ${getScreenClass('today')}`}>
          <TodayScreen habits={habits} setHabits={setHabits} onHabitTap={h => setSelectedHabit(h)} tweak={tweak} confettiRef={confettiRef} onAddHabit={() => setShowCreate(true)} />
        </div>

        {/* Stats */}
        <div className={`screen ${getScreenClass('stats')}`}>
          <StatsScreen habits={habits} />
        </div>

        {/* Reflect */}
        <div className={`screen ${getScreenClass('reflect')}`}>
          <ReflectScreen habits={habits} />
        </div>

        {/* Detail overlay */}
        <div className={`screen ${getScreenClass('detail')}`}>
          <HabitDetailScreen habit={selectedHabit} onBack={() => setSelectedHabit(null)} tweak={tweak} />
        </div>

        {/* Create overlay */}
        <div className={`screen ${getScreenClass('create')}`}>
          <CreateHabitScreen onBack={() => setShowCreate(false)} onSave={h => { setHabits(p => [...p, h]); setShowCreate(false); }} />
        </div>
      </div>

      {/* Bottom nav */}
      {authDone && !showOnboarding && !isDetail && !isCreate && (
        <div className="bottom-nav">
          {[{id:'today',label:'Today',icon:'☀️'},{id:'stats',label:'Progress',icon:'📊'},{id:'reflect',label:'Reflect',icon:'✍️'}].map(n => (
            <button key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={() => setTab(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              <span className="nav-label">{n.label}</span>
            </button>
          ))}
          <button className="nav-item" onClick={() => window.postMessage({ type: '__activate_edit_mode' }, '*')}>
            <span className="nav-icon">⚙️</span>
            <span className="nav-label">Settings</span>
          </button>
        </div>
      )}

      {/* Settings panel */}
      <TweaksPanel title="Settings">
        <TweakSection label="Colors">
          <TweakColor label="Accent" value={tweak.accentColor} onChange={v => setTweak('accentColor', v)} />
          <TweakColor label="Dark accent" value={tweak.darkAccent} onChange={v => setTweak('darkAccent', v)} />
        </TweakSection>
        <TweakSection label="Behavior">
          <TweakToggle label="Confetti on check-off" value={tweak.enableConfetti} onChange={v => setTweak('enableConfetti', v)} />
        </TweakSection>
        <TweakSection label="Account">
          <div style={{ fontSize:12, color:'rgba(41,38,27,0.55)', padding:'2px 0' }}>Signed in as <b>{userName}</b></div>
          <TweakButton label="Sign out" secondary onClick={handleSignOut} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
